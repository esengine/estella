name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - macos-latest
          - windows-latest
          - ubuntu-latest

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 5.0.0

      - name: Setup ccache
        if: matrix.platform != 'windows-latest'
        uses: hendrikmuhs/ccache-action@v1.2.20
        with:
          key: ${{ matrix.platform }}-release
          max-size: 1G

      - name: Install dependencies
        run: pnpm install

      - name: Copy esbuild.wasm to desktop public
        shell: bash
        run: cp $(find node_modules/.pnpm -name 'esbuild.wasm' -path '*/esbuild-wasm/*' | head -1) desktop/public/esbuild.wasm

      - name: Build engine and sync to desktop
        run: node build-tools/cli.js build -t all

      - name: Package engine source for toolchain
        run: node build-tools/cli.js toolchain

      - name: Build SDK
        run: pnpm --filter ./sdk build

      - name: Build desktop renderer + main
        run: pnpm --filter ./desktop build

      - name: Package and publish desktop app
        run: pnpm --filter ./desktop exec electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
